name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy using SSM
        id: deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-07aca3c7abb49f909" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Spring Boot" \
            --parameters 'commands=[
              "set -e",
              "cd /home/ubuntu/5th-project-with_kim-server-2026",
              "git fetch origin",
              "git checkout main",
              "git pull origin main",
              "docker-compose down -v || true",
              "docker-compose up -d --build"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "Command ID: $COMMAND_ID"

      - name: Show SSM Output (if failed)
        if: failure()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.deploy.outputs.COMMAND_ID }}" \
            --instance-id "i-07aca3c7abb49f909"