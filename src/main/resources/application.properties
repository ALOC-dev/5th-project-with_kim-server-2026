# DB
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-time=${JWT_EXPIRATION_TIME}
jwt.refresh-expiration-time=${JWT_REFRESH_EXPIRATION_TIME}

# Kakao
kakao.client-id=${KAKAO_CLIENT_ID}
kakao.client-secret=${KAKAO_CLIENT_SECRET}
kakao.redirect-url=${KAKAO_REDIRECT_URL}
kakao.api.url=https://dapi.kakao.com
kakao.api.key=${KAKAO_API_KEY}

# Seoul OpenAPI
seoul.openapi.key=${SEOUL_OPENAPI_KEY:}

# AWS
aws.region=${AWS_REGION:ap-northeast-2}
aws.s3.bucket=${AWS_S3_BUCKET:local-placeholder-bucket}
aws.sqs.request-queue-url=${AWS_SQS_REQUEST_QUEUE_URL:}
aws.sqs.result-queue-url=${AWS_SQS_RESULT_QUEUE_URL:}
aws.sqs.result-poll-delay-ms=${AWS_SQS_RESULT_POLL_DELAY_MS:5000}

#openai
openai.api-key=${OPENAI_API_KEY}
openai.embedding-model=text-embedding-3-small
