services:
  app:
    build: .
    container_name: spring-app
    restart: unless-stopped

    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=local

  nginx:

    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt #인증서 보관함 공유
      - ./certbot/www:/var/www/certbot #발급 심사용 통로

    depends_on:
      - app
    restart: unless-stopped #ec2 재부팅이나 컨테이너가 죽었을 때 자동 재시작